name: CI/CD Smart Traffic

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd backend/services/auth-service && npm ci
          cd ../vehicle-service && npm ci
          cd ../traffic-service && npm ci
          cd ../incident-service && npm ci
          cd ../notification-service && npm ci
          cd ../../gateway && npm ci
          cd ../../frontend && npm ci

      - name: Run tests
        run: |
          cd backend/services/auth-service && npm test -- --passWithNoTests
          cd ../vehicle-service && npm test -- --passWithNoTests

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          cd backend
          docker-compose build

      - name: Test Docker Compose
        run: |
          cd backend
          docker-compose up -d
          sleep 30
          curl -f http://localhost:4000/health || exit 1
          docker-compose down
